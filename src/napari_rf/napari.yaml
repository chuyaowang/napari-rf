name: napari-rf
display_name: napari rf

contributions:
  commands:
    - id: napari-rf.get_reader
      python_name: napari_rf._reader:napari_get_reader
      title: Open data with napari rf
    - id: napari-rf.write_multiple
      python_name: napari_rf._writer:write_multiple
      title: Save multi-layer data with napari rf
    - id: napari-rf.write_single_image
      python_name: napari_rf._writer:write_single_image
      title: Save image data with napari rf
    - id: napari-rf.make_sample_data
      python_name: napari_rf._sample_data:make_sample_data
      title: Load sample data from napari rf
    - id: napari-rf.make_rfwidget
      python_name: napari_rf:RFWidget
      title: Make example QWidget
  readers:
    - command: napari-rf.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']
  writers:
    - command: napari-rf.write_multiple
      layer_types: ['image*','labels*']
      filename_extensions: []
    - command: napari-rf.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']
  sample_data:
    - command: napari-rf.make_sample_data
      display_name: napari rf
      key: unique_id.1
  widgets:
    - command: napari-rf.make_rfwidget
      display_name: RFWidget
